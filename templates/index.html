<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Preview Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            resize: vertical;
        }
        .file-input {
            padding: 20px 0;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        .separator {
            text-align: center;
            margin: 20px 0;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Code Preview Tool</h1>
        <form action="/preview" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="text_content">Enter your code directly:</label>
                <textarea id="text_content" name="text_content" placeholder="Paste your code here..."></textarea>
            </div>
            
            <div class="separator">OR</div>
            
            <div class="form-group file-input">
                <label for="file">Upload a file:</label>
                <input type="file" id="file" name="file" accept=".txt,.py,.js,.html,.css,.json,.md">
            </div>
            
            <button type="submit">Preview Code</button>
        </form>
    </div>
</body>
</html>
