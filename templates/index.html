<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Preview Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            resize: vertical;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        .options {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Code Preview Tool</h1>
        <form action="/preview" method="post" enctype="multipart/form-data">
            <div class="options">
                <div>
                    <input type="radio" id="text_input" name="input_type" value="text" checked>
                    <label for="text_input">Text Input</label>
                </div>
                <div>
                    <input type="radio" id="file_upload" name="input_type" value="file">
                    <label for="file_upload">File Upload</label>
                </div>
            </div>
            
            <div class="form-group" id="text_group">
                <label for="text_content">Enter your code:</label>
                <textarea id="text_content" name="text_content" placeholder="Paste your code here..."></textarea>
            </div>
            
            <div class="form-group" id="file_group" style="display: none;">
                <label for="file">Upload a file:</label>
                <input type="file" id="file" name="file">
            </div>
            
            <button type="submit">Preview Code</button>
        </form>
    </div>
    
    <script>
        document.querySelectorAll('input[name="input_type"]').forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.value === 'text') {
                    document.getElementById('text_group').style.display = 'block';
                    document.getElementById('file_group').style.display = 'none';
                } else {
                    document.getElementById('text_group').style.display = 'none';
                    document.getElementById('file_group').style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
