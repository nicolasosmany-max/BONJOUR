<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prévisualisation - {{ site_name }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .iframe-container {
            width: 100%;
            height: 500px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin: 20px 0;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        a {
            display: inline-block;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
        .download {
            background-color: #4CAF50;
            color: white;
        }
        .back {
            background-color: #f44336;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Prévisualisation de {{ site_name }}</h1>
        <div class="iframe-container">
            <iframe src="/generated_sites/{{ site_name }}/index.html"></iframe>
        </div>
        <div class="actions">
            <a href="/generated_sites/{{ site_name }}/index.html" class="download" download>Télécharger le Site</a>
            <a href="/" class="back">Retour au Générateur</a>
        </div>
    </div>
</body>
</html>
